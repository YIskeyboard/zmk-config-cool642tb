CONFIG_ZMK_KEYBOARD_NAME="cool642tb"

# --- 基本機能設定 ---
CONFIG_ZMK_MOUSE=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_POINTING=y

# --- バス・入力設定 ---
CONFIG_SPI=y
CONFIG_INPUT=y

# --- トラックボール（PMW3610）基本設定 ---
CONFIG_PMW3610=y
# 【修正】勝手に大きく動きすぎるのを防ぐため、解像度を400に下げて精密化
CONFIG_PMW3610_CPI=400
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_180=y
CONFIG_PMW3610_SCROLL_TICK=16
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_SCROLL_X=y 

# --- トラックボール（PMW3610）レスポンス向上設定 ---
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=700
CONFIG_PMW3610_POLLING_RATE_125_SW=n
CONFIG_PMW3610_SMART_ALGORITHM=n

# --- ロータリーエンコーダー設定 ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- バッテリー・Studio設定 ---
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n 

# --- Bluetooth互換性・Mac接続安定化設定 ---
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_BT_CTLR_PHY_2M=n

# --- パスコード入力を無効化（左右間通信は維持） ---
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

# --- Bluetooth通信間隔調整（Mac専用・超低遅延化カスタム） ---
CONFIG_BT_GAP_PERIPHERAL_PREF_PARAMS=y
# 【修正】Macが拒否しない限界値（7.5ms〜11.25ms）まで狭め、通信の遅延（タイムラグ）を徹底的に排除
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
